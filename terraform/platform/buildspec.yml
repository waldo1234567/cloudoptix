version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "Installing Terraform..."
      - curl -s -qL -o terraform.zip https://releases.hashicorp.com/terraform/1.8.0/terraform_1.8.0_linux_amd64.zip
      - unzip -q terraform.zip
      - mv terraform /usr/local/bin/
      - terraform --version

  pre_build:
    commands:
      - echo "Initializing Autonomous Deployment for Tenant ${TENANT_ID}"

      # Sync the full tenant workspace (main.tf, providers.tf, variables.tf, uploaded .tf, etc.)
      - aws s3 sync s3://${CONFIG_BUCKET}/${TENANT_ID}/ ./ --exclude "*" --include "*.tf"
      - echo "Workspace files:" && ls -1 *.tf

      # Cross-account model: the CodeBuild runner role (platform account) owns the
      # S3 backend, while the "aws" provider assumes the tenant role for resources.
      # We do NOT export tenant credentials here — that would make the backend init
      # authenticate as the tenant and fail to reach the platform state bucket.

      # CloudOptix owns the backend: regenerate it (overwriting any synced backend.tf)
      # so the whole tenant workspace shares a single state file.
      - |
        cat <<EOF > backend.tf
        terraform {
          backend "s3" {
            bucket = "${STATE_BUCKET}"
            key    = "${TENANT_ID}/terraform.tfstate"
            region = "${AWS_REGION}"
          }
        }
        EOF

      - terraform init -no-color

  build:
    commands:
      - echo "Generating terraform plan..."
      - terraform plan -no-color -out=tfplan
      - |
        if [ "${APPLY}" = "true" ]; then
          echo "APPLY=true -> executing terraform apply"
          terraform apply -no-color -auto-approve tfplan
        else
          echo "APPLY=false -> plan preview only. No changes applied."
        fi

  post_build:
    commands:
      - |
        if [ $CODEBUILD_BUILD_SUCCEEDING -eq 1 ]; then
          echo "Deployment Successful."
        else
          echo "Deployment Failed. Review Terraform logs."
          exit 1
        fi  