name: Backend CI/CD

# Terraform first backend. State + AWS credentials live in Terraform Cloud
# (workspace: cloudoptix-platform, remote execution), so CI only needs a
# TF_API_TOKEN secret. No AWS keys are stored in GitHub.

on:
  push:
    branches: [main]
    paths:
      - "terraform/platform/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "terraform/platform/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKING_DIR: terraform/platform

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Lambda sources
        run: python -m compileall -q terraform/platform/src/lambdas terraform/platform/src/rules

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform fmt
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -input=false

      - name: Terraform validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

  plan:
    name: Plan (PR)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -input=false

      - name: Terraform plan
        id: plan
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan -input=false -no-color
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const plan = (process.env.PLAN || '').substring(0, 60000);
            const body = [
              `#### Terraform Plan \`${{ steps.plan.outcome }}\``,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    name: Apply (main)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Requires a manual approval from a reviewer configured on this environment.
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} init -input=false

      - name: Terraform apply
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve -input=false
