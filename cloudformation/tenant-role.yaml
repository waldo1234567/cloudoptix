AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudOptix Cross-Account Access Role'

Parameters:
  PlatformAccountID:
    Type: String
    Description: 'The AWS Account ID of the CloudOptix Platform Account'
  CloudOptixExternalID:
    Type: String
    Description: 'The External ID to be used when CloudOptix assumes this role'

Resources:
  CloudOptixCrossAccountRole:
    Type: 'AWS::IAM::Role'
    Properties:
      RoleName: 'CloudOptix-Tenant-Deployment-Role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: 'Allow'
            Principal:
              AWS: !Sub 'arn:aws:iam::${PlatformAccountID}:root'
            Action: 'sts:AssumeRole'
            Condition:
              StringEquals:
                sts:ExternalId: !Ref CloudOptixExternalID
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AdministratorAccess'
Outputs:
  RoleARN:
    Description: 'The ARN of the CloudOptix Cross-Account Role'
    Value: !GetAtt CloudOptixCrossAccountRole.Arn